# Composite action to upload junit test result files to Datadog Test Optimization
name: "Datadog JUnitXML Upload"
description: "Upload JUnitXML reports files to Datadog Test Optimization"
inputs:
  api_key:
    required: true
    description: Datadog API key to use to upload the junit files.
  site:
    required: false
    default: datadoghq.com
    description: The Datadog site to upload the files to.
  files:
    required: true
    description: JUnit files to upload.
    default: .
  auto-discovery:
    required: true
    description: Do a recursive search and automatic junit files discovery in the folders provided in `files` input (current folder if omitted).
    default: 'true'
  ignored-paths:
    required: false
    description: A comma-separated list of paths that are ignored when junit files auto-discovery is done. Glob patterns are supported
  concurrency:
    required: true
    description: Controls the maximum number of concurrent file uploads.
    default: "20"
  tags:
    required: false
    description: Datadog tags to associate with the uploaded test results.
  service:
    required: false
    description: Service name to use with the uploaded test results.
  env:
    required: false
    description: Datadog env to use for the tests.
  logs:
    required: false
    description: Set to "true" to enable forwarding content from XML reports as logs.
  datadog-ci-version:
    required: false
    description: Version of datadog-ci to install. Defaults to the pinned datadog-ci release shipped with this action version. Use a major version like `v5` to get the latest release within that major version, or a specific tag like `v5.6.0` to pin. Legacy npm semver syntax (^, ~, >=, latest) is still supported but deprecated.
    default: "v5.14.0"
  github-token:
    required: false
    default: ""
    description: GitHub token to use for authenticated datadog-ci release resolution. Defaults to the workflow token when omitted.
  extra-args:
    default: ""
    description: Extra args to be passed to the datadog-ci cli.
    required: false
runs:
  using: "composite"
  steps:
    # TODO: Remove this step in the next major version (v3.0.0)
    #       Users should migrate to GitHub release tag syntax: v5, v5.10.0, etc.
    - name: Translate version format (backwards compatibility)
      id: translate-version
      shell: bash
      run: |
        translated_version=$("${GITHUB_ACTION_PATH}/scripts/translate-version.sh" "${{ inputs.datadog-ci-version }}")
        echo "version=${translated_version}" >> "$GITHUB_OUTPUT"

    - name: Install datadog-ci
      uses: DataDog/install-datadog-ci-github-action@6d7f0c7c5402a4b1912055b76970ca76bef71fe5 # v1.0.4
      with:
        version: ${{ steps.translate-version.outputs.version }}
        github-token: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}

    - name: Upload the JUnit files
      shell: bash
      run: |
        datadog-ci junit upload \
          --max-concurrency ${{ inputs.concurrency }} \
          ${{ inputs.logs == 'true' && '--logs' || '' }} \
          ${{ inputs.auto-discovery == 'true' && '--auto-discovery' || '' }} \
          ${{ inputs.ignored-paths != '' && format('--ignored-paths {0}', inputs.ignored-paths) || '' }} \
          ${{ inputs.service != '' && format('--service {0}', inputs.service) || '' }} \
          ${{ inputs.extra-args }} \
          ${{ inputs.files }}
      env:
        DD_API_KEY: ${{ inputs.api_key }}
        DD_SITE: ${{ inputs.site }}
        DD_ENV: ${{ inputs.env }}
        DD_TAGS: ${{ inputs.tags }}
