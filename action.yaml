# Composite action to upload junit test result files to Datadog Test Optimization
name: "Datadog JUnitXML Upload"
description: "Upload JUnitXML reports files to Datadog Test Optimization"
inputs:
  api_key:
    required: true
    description: Datadog API key to use to upload the junit files.
  site:
    required: false
    default: datadoghq.com
    description: The Datadog site to upload the files to.
  files:
    required: true
    description: JUnit files to upload.
    default: .
  auto-discovery:
    required: true
    description: Do a recursive search and automatic junit files discovery in the folders provided in `files` input (current folder if omitted).
    default: 'true'
  ignored-paths:
    required: false
    description: A comma-separated list of paths that are ignored when junit files auto-discovery is done. Glob patterns are supported
  concurrency:
    required: true
    description: Controls the maximum number of concurrent file uploads.
    default: "20"
  tags:
    required: false
    description: Datadog tags to associate with the uploaded test results.
  service:
    required: false
    description: Service name to use with the uploaded test results.
  env:
    required: false
    description: Datadog env to use for the tests.
  logs:
    required: false
    description: Set to "true" to enable forwarding content from XML reports as logs.
  datadog-ci-version:
    required: false
    description: >
      The version of the datadog-ci standalone binary to download from GitHub Releases.
      Defaults to 5.9.1 (pinned for supply-chain safety). Do not use "latest" — pin
      to a specific version so checksum verification is deterministic.
    default: "5.9.1"
  platform:
    required: false
    description: >
      Target platform binary to download from GitHub Releases. Available options:
      linux-x64, linux-arm64, darwin-x64, darwin-arm64, win-x64.
      Defaults to linux-x64 which covers most GitHub-hosted and self-hosted runners.
    default: "linux-x64"
  extra-args:
    default: ""
    description: Extra args to be passed to the datadog-ci cli.
    required: false
runs:
  using: "composite"
  steps:
    - name: Download and verify datadog-ci binary
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL -o datadog-ci \
          "https://github.com/DataDog/datadog-ci/releases/download/v${{ inputs.datadog-ci-version }}/datadog-ci_${{ inputs.platform }}"
        curl -fsSL -o checksums.txt \
          "https://github.com/DataDog/datadog-ci/releases/download/v${{ inputs.datadog-ci-version }}/checksums.txt"
        grep "datadog-ci_${{ inputs.platform }}" checksums.txt \
          | sed "s|datadog-ci_${{ inputs.platform }}|datadog-ci|" \
          | sha256sum --check
        chmod +x datadog-ci

    - name: Upload the JUnit files
      shell: bash
      run: |
        ./datadog-ci junit upload \
          --max-concurrency ${{ inputs.concurrency }} \
          ${{ inputs.logs == 'true' && '--logs' || '' }} \
          ${{ inputs.auto-discovery == 'true' && '--auto-discovery' || '' }} \
          ${{ inputs.ignored-paths != '' && format('--ignored-paths {0}', inputs.ignored-paths) || '' }} \
          ${{ inputs.service != '' && format('--service {0}', inputs.service) || '' }} \
          ${{ inputs.extra-args }} \
          ${{ inputs.files }}
      env:
        DD_API_KEY: ${{ inputs.api_key }}
        DD_SITE: ${{ inputs.site }}
        DD_ENV: ${{ inputs.env }}
        DD_TAGS: ${{ inputs.tags }}
