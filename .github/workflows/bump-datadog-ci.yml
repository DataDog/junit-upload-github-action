name: Bump datadog-ci default

on:
  workflow_dispatch:
    inputs:
      datadog-ci-version:
        description: Optional exact datadog-ci release tag. Defaults to the latest datadog-ci release.
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  BUMP_LABEL: datadog-ci-version-bump

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Prefer a PAT or GitHub App token so PRs created by this workflow can trigger CI.
          # Falls back to GITHUB_TOKEN when the secret is not configured.
          token: ${{ secrets.GH_RELEASE_AUTOMATION_TOKEN || github.token }}

      - name: Compute bump
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_AUTOMATION_TOKEN || github.token }}
          REQUESTED_DATADOG_CI_VERSION: ${{ inputs['datadog-ci-version'] }}
        run: |
          set -euo pipefail

          current_version=$(ruby -ryaml -e 'puts YAML.load_file("action.yaml").fetch("inputs").fetch("datadog-ci-version").fetch("default")')
          if [[ -n "$REQUESTED_DATADOG_CI_VERSION" ]]; then
            latest_version="$REQUESTED_DATADOG_CI_VERSION"
          else
            latest_version=$(gh api repos/DataDog/datadog-ci/releases/latest --jq '.tag_name')
          fi

          if [[ ! "$latest_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected an exact datadog-ci release tag like v5.13.1, got '$latest_version'"
            exit 1
          fi

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "latest_version=$latest_version" >> "$GITHUB_OUTPUT"
          echo "branch_name=automation/datadog-ci-${latest_version#v}" >> "$GITHUB_OUTPUT"
          if [[ "$current_version" == "$latest_version" ]]; then
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Report no bump
        if: steps.versions.outputs.needs_bump == 'false'
        run: |
          echo "datadog-ci-version already defaults to ${{ steps.versions.outputs.current_version }}."

      - name: Check for an existing bump PR
        if: steps.versions.outputs.needs_bump == 'true'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_AUTOMATION_TOKEN || github.token }}
          BRANCH_NAME: ${{ steps.versions.outputs.branch_name }}
        run: |
          set -euo pipefail
          pr_number=$(gh pr list --head "$BRANCH_NAME" --state open --json number --jq '.[0].number // ""')
          echo "number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Report existing bump PR
        if: steps.versions.outputs.needs_bump == 'true' && steps.existing_pr.outputs.number != ''
        run: |
          echo "An open bump PR already exists: #${{ steps.existing_pr.outputs.number }}."

      - name: Create bump commit
        if: steps.versions.outputs.needs_bump == 'true' && steps.existing_pr.outputs.number == ''
        env:
          BRANCH_NAME: ${{ steps.versions.outputs.branch_name }}
          LATEST_VERSION: ${{ steps.versions.outputs.latest_version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"

          scripts/bump-datadog-ci-version.sh "$LATEST_VERSION"

          git add action.yaml README.md
          git commit -m "Bump datadog-ci to $LATEST_VERSION"
          git push --force --set-upstream origin "$BRANCH_NAME"

      - name: Open bump PR
        if: steps.versions.outputs.needs_bump == 'true' && steps.existing_pr.outputs.number == ''
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_AUTOMATION_TOKEN || github.token }}
          BRANCH_NAME: ${{ steps.versions.outputs.branch_name }}
          CURRENT_VERSION: ${{ steps.versions.outputs.current_version }}
          LATEST_VERSION: ${{ steps.versions.outputs.latest_version }}
        run: |
          set -euo pipefail

          gh label create "$BUMP_LABEL" \
            --description "Triggers a junit-upload-github-action release after merge" \
            --color "1D76DB" \
            --force

          body_file=$(mktemp)
          cat > "$body_file" <<EOF
          ## Summary

          Bumps the default \`datadog-ci-version\` from \`$CURRENT_VERSION\` to \`$LATEST_VERSION\`.

          ## Release behavior

          Merging this PR with the \`$BUMP_LABEL\` label will trigger the release workflow. That workflow creates the next immutable action tag, moves the major action tag, and creates a GitHub Release.
          EOF

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Bump datadog-ci to $LATEST_VERSION" \
            --body-file "$body_file" \
            --label "$BUMP_LABEL"
