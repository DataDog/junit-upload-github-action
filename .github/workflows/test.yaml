name: 'Test Action'
on:
  pull_request:
  push:
    branches:
      - main
      - 'release/*'
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC every day

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Upload reports using a glob pattern
        uses: ./
        with:
          api_key: ${{secrets.DD_API_KEY_CI_VISIBILITY}}
          github-token: ${{ github.token }}
          logs: "true"
          files: '**/fixtures/**'
          service: junit-upload-github-action-tests
          env: ci
          tags: "foo:bar,alpha:bravo"
      - name: Check that test data can be queried
        run: |
          npm install @datadog/datadog-api-client
          node ./check-junit-upload.js
        env:
          EXTRA_TAGS: "@foo:bar @alpha:bravo"
          DD_API_KEY: ${{ secrets.DD_API_KEY_CI_VISIBILITY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY_CI_VISIBILITY }}
          DD_SERVICE: junit-upload-github-action-tests
  test-legacy-version-syntax:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Test backwards compatibility with legacy npm semver syntax
        version: ["latest", "^5.0.0", "~5.0.0", ">=5.0.0", "5.x"]
    steps:
      - uses: actions/checkout@v4
      - name: Sanitize version for tag
        id: sanitize
        run: |
          version="${{ matrix.version }}"
          # Replace special characters with safe equivalents for tags
          safe_version=$(echo "$version" | sed 's/\^/caret-/g; s/~/tilde-/g; s/>=/gte-/g; s/>/gt-/g; s/<=/lte-/g; s/</lt-/g')
          echo "safe_version=${safe_version}" >> "$GITHUB_OUTPUT"
      - name: Upload reports using legacy version syntax
        uses: ./
        with:
          api_key: ${{secrets.DD_API_KEY_CI_VISIBILITY}}
          github-token: ${{ github.token }}
          logs: "true"
          files: '**/fixtures/**'
          service: junit-upload-github-action-tests
          env: ci
          tags: "foo:legacy,alpha:legacy,version.syntax:${{ steps.sanitize.outputs.safe_version }}"
          datadog-ci-version: ${{ matrix.version }}
      - name: Check that test data can be queried
        run: |
          npm install @datadog/datadog-api-client
          node ./check-junit-upload.js
        env:
          EXTRA_TAGS: "@foo:legacy @alpha:legacy @version.syntax:${{ steps.sanitize.outputs.safe_version }}"
          DD_API_KEY: ${{ secrets.DD_API_KEY_CI_VISIBILITY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY_CI_VISIBILITY }}
          DD_SERVICE: junit-upload-github-action-tests

  test-older-datadog-ci-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Grab second latest version of @datadog/datadog-ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          releases=$(curl --fail-with-body --silent --show-error --location \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/DataDog/datadog-ci/releases")
          SECOND_LATEST_VERSION=$(printf '%s' "$releases" | jq -er '
            if type != "array" then
              error("unexpected GitHub releases response: \(.message // .)")
            else
              [ .[] | {tag_name: .tag_name, published_at: .published_at} ]
              | sort_by(.published_at)
              | reverse
              | .[:2]
              | .[1]
              | .tag_name
            end
          ')
          echo "SECOND_LATEST_VERSION=$SECOND_LATEST_VERSION" >> $GITHUB_ENV
      - name: Upload reports using a glob pattern
        uses: ./
        with:
          api_key: ${{secrets.DD_API_KEY_CI_VISIBILITY}}
          github-token: ${{ github.token }}
          logs: "true"
          files: '**/fixtures/**'
          service: junit-upload-github-action-tests
          env: ci
          tags: "foo:previous,alpha:previous"
          datadog-ci-version: ${{ env.SECOND_LATEST_VERSION }}
      - name: Check that test data can be queried
        run: |
          npm install @datadog/datadog-api-client
          node ./check-junit-upload.js
        env:
          EXTRA_TAGS: "@foo:previous @alpha:previous"
          DD_API_KEY: ${{ secrets.DD_API_KEY_CI_VISIBILITY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY_CI_VISIBILITY }}
          DD_SERVICE: junit-upload-github-action-tests

  test-should-complain-about-missing-api-key:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Upload reports using a glob pattern
        uses: ./
        id: test_step
        with:
          github-token: ${{ github.token }}
          logs: "true"
          files: '**/fixtures/**'
          service: junit-upload-github-action-tests
          env: ci
          tags: "foo:bar,alpha:bravo"
        continue-on-error: true
      - name: Check that previous step failed
        if: steps.test_step.outcome == 'success'
        run: |
          echo "The previous step did not fail as expected"
          exit 1
