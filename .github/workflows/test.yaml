name: 'Test Action'
on:
  pull_request:
  push:
    branches:
      - main
      - 'release/*'
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC every day

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run unit tests
        run: yarn test

      - name: Build action
        run: yarn build

      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "ERROR: dist/ is out of date. Run 'yarn build' and commit the changes."
            git diff dist/
            exit 1
          fi

  test-upload:
    name: Test JUnit Upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload JUnit reports with bundled datadog-ci
        uses: ./
        with:
          api_key: ${{secrets.DD_API_KEY_CI_VISIBILITY}}
          logs: "true"
          files: '**/fixtures/**'
          service: junit-upload-github-action-tests
          env: ci
          tags: "foo:bar,alpha:bravo,bundled:true"

      - name: Verify test data can be queried
        run: |
          npm install @datadog/datadog-api-client
          node ./check-junit-upload.js
        env:
          EXTRA_TAGS: "@foo:bar @alpha:bravo @bundled:true"
          DD_API_KEY: ${{ secrets.DD_API_KEY_CI_VISIBILITY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY_CI_VISIBILITY }}
          DD_SERVICE: junit-upload-github-action-tests

  test-backward-compatibility:
    name: Test Backward Compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload with legacy inputs (should be ignored)
        uses: ./
        with:
          api_key: ${{secrets.DD_API_KEY_CI_VISIBILITY}}
          logs: "true"
          files: '**/fixtures/**'
          service: junit-upload-github-action-tests
          env: ci
          tags: "foo:legacy,alpha:legacy"
          # These legacy inputs should be ignored without error
          node-version: "20"
          datadog-ci-version: "5.10.0"

      - name: Verify backward compatibility
        run: |
          npm install @datadog/datadog-api-client
          node ./check-junit-upload.js
        env:
          EXTRA_TAGS: "@foo:legacy @alpha:legacy"
          DD_API_KEY: ${{ secrets.DD_API_KEY_CI_VISIBILITY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY_CI_VISIBILITY }}
          DD_SERVICE: junit-upload-github-action-tests

  test-missing-api-key:
    name: Test Missing API Key Error
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload without API key (should fail)
        uses: ./
        id: test_step
        with:
          logs: "true"
          files: '**/fixtures/**'
          service: junit-upload-github-action-tests
          env: ci
          tags: "foo:bar,alpha:bravo"
        continue-on-error: true

      - name: Verify step failed as expected
        if: steps.test_step.outcome == 'success'
        run: |
          echo "ERROR: Action should have failed without API key"
          exit 1

      - name: Confirm failure
        if: steps.test_step.outcome == 'failure'
        run: echo "✓ Action correctly failed without API key"
