name: Release on datadog-ci bump

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: read

env:
  BUMP_LABEL: datadog-ci-version-bump

jobs:
  release:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'datadog-ci-version-bump')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Create action release
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail

          datadog_ci_version=$(ruby -ryaml -e 'puts YAML.load_file("action.yaml").fetch("inputs").fetch("datadog-ci-version").fetch("default")')
          if [[ ! "$datadog_ci_version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected datadog-ci-version default to be an exact release tag, got '$datadog_ci_version'"
            exit 1
          fi

          existing_release_tag=$(git tag --points-at "$GITHUB_SHA" --list 'v[0-9]*.[0-9]*.[0-9]*' | head -n 1)
          if [[ -n "$existing_release_tag" ]]; then
            echo "Commit $GITHUB_SHA is already released as $existing_release_tag."
            exit 0
          fi

          latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [[ -z "$latest_tag" ]]; then
            echo "No existing semver action tag found."
            exit 1
          fi

          version="${latest_tag#v}"
          IFS=. read -r major minor patch <<< "$version"
          next_tag="v${major}.${minor}.$((patch + 1))"
          major_tag="v${major}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "$next_tag" "$GITHUB_SHA"
          git tag -f "$major_tag" "$GITHUB_SHA"
          git push origin "refs/tags/$next_tag"
          git push --force origin "refs/tags/$major_tag"

          notes_file=$(mktemp)
          cat > "$notes_file" <<EOF
          Updates the default \`datadog-ci-version\` to \`$datadog_ci_version\`.

          Triggered by #$PR_NUMBER: $PR_URL
          EOF

          gh release create "$next_tag" \
            --target "$GITHUB_SHA" \
            --title "$next_tag" \
            --notes-file "$notes_file"
